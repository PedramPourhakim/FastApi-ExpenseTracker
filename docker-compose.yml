services:
  db_expense_tracker:
    image: postgres:latest
    container_name: db_expense_tracker
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "5432:5432"

  redis_expense_tracker:
    image: redis:7-alpine
    container_name: redis_expense_tracker
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    # اگر بخوای persistence داشته باشی، می‌تونی این رو هم اضافه کنی:
    volumes:
      - ./redis-data:/data
    command: ["redis-server", "--save", "20", "1", "--loglevel", "warning"]

  locust:
    image: locustio/locust
    container_name: locust_expense_tracker
    ports:
      - "8089:8089"
    volumes:
      - ./app/locust:/mnt/locust
    command: -f /mnt/locust/locustfile.py

  backend_expense_tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend_expense_tracker
    restart: always
    depends_on:
      - db_expense_tracker
      - redis_expense_tracker
    environment:
      SQLALCHEMY_DATABASE_URL: postgresql://postgres:postgres@db_expense_tracker:5432/postgres
      JWT_SECRET_KEY: Testkjfejdfqwejd;qwekd;qwkd;qwekd;qwkd;qwkdjfjwefj
      # اگر توی کدت از Redis استفاده می‌کنی، مثل این هم می‌تونی ست کنی:
      REDIS_URL: redis://redis:6379
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    volumes:
      - ./app:/usr/src/core

